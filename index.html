<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nduduzo Nxasane | Portfolio</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    /* LOADER */
    #loader {
      position:fixed;
      width:100%;
      height:100%;
      background:#020617;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    .spinner {
      width:50px;
      height:50px;
      border:5px solid #1e293b;
      border-top:5px solid #38bdf8;
      border-radius:50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    header {
      text-align:center;
      padding:80px 20px;
    }

    nav {
      display:flex;
      justify-content:center;
      gap:20px;
      padding:15px;
      background:#020617;
    }

    section {
      max-width:1000px;
      margin:auto;
      padding:60px 20px;
    }

    .btn {
      background:#38bdf8;
      padding:10px 20px;
      text-decoration:none;
      color:black;
      border-radius:5px;
    }

    .card {
      background:#020617;
      padding:20px;
      border-radius:10px;
    }

    /* FORM */
    form {
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input, textarea {
      padding:10px;
      border:none;
      border-radius:5px;
    }

    textarea {
      resize:none;
      height:120px;
    }

  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<header>
  <h1>Nduduzo Nxasane</h1>
  <p>Software Developer</p>
</header>

<nav>
  <a href="#contact">Contact</a>
</nav>

<section id="contact">
  <h2>Contact Me</h2>

  <form action="https://formspree.io/f/your-id" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit" class="btn">Send Message</button>
  </form>

</section>

<script>
  // LOADER HIDE
  window.addEventListener('load', () => {
    document.getElementById('loader').style.display = 'none';
  });
</script>

</body>
</html>
